<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"/><meta name="viewport"content="width=device-width, initial-scale=1.0"/><title>AI Liquid Reality</title><link rel="icon"href="https://cdn.jsdelivr.net/gh/yiqi888/AI-Liquid-Reality@main/favicon.ico"type="image/x-icon"><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}body{overflow:hidden;background:#05060a;color:#fff}canvas{position:fixed;top:0;left:0;z-index:0}.hero{position:relative;z-index:2;height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;flex-direction:column}h1{font-size:64px;font-weight:600;letter-spacing:-1px;background:linear-gradient(120deg,#7cf7ff,#a78bfa,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px rgba(120,200,255,0.25))}p{margin-top:18px;font-size:18px;opacity:0.7;max-width:600px;line-height:1.6}.btn{margin-top:30px;padding:12px 28px;border-radius:999px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);color:#fff;backdrop-filter:blur(10px);cursor:pointer;transition:0.3s}.btn:hover{transform:scale(1.05);box-shadow:0 0 40px rgba(120,200,255,0.25)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(12px);display:flex;justify-content:center;align-items:center;opacity:0;visibility:hidden;transition:.35s;z-index:99}.modal.show{opacity:1;visibility:visible}.glass-card{width:380px;padding:40px;border-radius:28px;background:rgba(255,255,255,.08);backdrop-filter:blur(35px);border:1px solid rgba(255,255,255,.15);box-shadow:0 25px 80px rgba(0,0,0,.45),inset 0 1px rgba(255,255,255,.15)}.glass-card h2{font-size:34px;margin-bottom:8px;background:linear-gradient(90deg,#7cf7ff,#b388ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.glass-card p{margin:0 0 25px;opacity:.65}.glass-card input{width:100%;padding:15px 18px;margin-bottom:15px;border:none;outline:none;border-radius:16px;background:rgba(255,255,255,.08);color:white;font-size:16px;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12)}.glass-card input::placeholder{color:rgba(255,255,255,.45)}.actions{display:flex;gap:12px;margin-top:10px}.glass-btn{flex:1;padding:14px;border:none;border-radius:999px;color:white;cursor:pointer;background:rgba(255,255,255,.08);backdrop-filter:blur(25px);border:1px solid rgba(255,255,255,.15);transition:.3s}.glass-btn:hover{transform:translateY(-2px);box-shadow:0 0 25px rgba(124,247,255,.35)}.error{color:#ff6b81;font-size:14px;min-height:20px;margin-top:5px;opacity:0;transition:.3s}.error.show{opacity:1}@keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}100%{transform:translateX(0)}}.shake{animation:shake.45s}.modal{opacity:0;visibility:hidden;transition:.35s}.modal.show{opacity:1;visibility:visible}.glass-card{transform:translateY(30px)scale(.85);opacity:0;transition:transform.45s cubic-bezier(.22,1,.36,1),opacity.35s}.modal.show.glass-card{transform:translateY(0)scale(1);opacity:1}</style></head><body><canvas id="scene"></canvas><div class="hero"><h1>AI Liquid Reality</h1><p>由流体、光和粒子组成的智能空间系统。</p><p>重新定义界面与计算之间的边界</p><button class="btn">探索</button><div id="loginModal"class="modal"><div class="glass-card"><h2>欢迎</h2><p>探索AI Liquid Reality</p><input type="text"placeholder="用户名"><input type="password"placeholder="密码"><div id="loginError"class="error"></div><div class="actions"><button class="glass-btn"id="loginBtn">登录</button><button class="glass-btn"id="closeBtn">取消</button></div></div></div></div><!--Three.js--><script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script><script>const canvas=document.getElementById("scene");const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});renderer.setSize(window.innerWidth,window.innerHeight);const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,0.1,100);camera.position.z=2;const geometry=new THREE.PlaneGeometry(2,2);const material=new THREE.ShaderMaterial({uniforms:{uTime:{value:0}},vertexShader:`void main(){gl_Position=vec4(position,1.0)}`,fragmentShader:`precision highp float;uniform float uTime;float noise(vec2 p){return sin(p.x*3.0+uTime)*cos(p.y*3.0+uTime*0.7)}void main(){vec2 uv=gl_FragCoord.xy/1300.0;float n=noise(uv*4.0);vec3 blue=vec3(0.0,0.7,1.0);vec3 purple=vec3(0.6,0.3,1.0);vec3 cyan=vec3(0.0,1.0,0.8);vec3 col=mix(blue,purple,n);col=mix(col,cyan,sin(uTime+uv.x*5.0));float vignette=smoothstep(1.2,0.2,length(uv-0.5));gl_FragColor=vec4(col*vignette,1.0)}`});scene.add(new THREE.Mesh(geometry,material));const particlesCount=1200;const positions=new Float32Array(particlesCount*3);for(let i=0;i<particlesCount;i++){positions[i*3]=(Math.random()-0.5)*5;positions[i*3+1]=(Math.random()-0.5)*5;positions[i*3+2]=(Math.random()-0.5)*5}const particlesGeo=new THREE.BufferGeometry();particlesGeo.setAttribute("position",new THREE.BufferAttribute(positions,3));const particlesMat=new THREE.PointsMaterial({size:0.008,color:new THREE.Color("#7cf7ff"),transparent:true,opacity:0.7});const particles=new THREE.Points(particlesGeo,particlesMat);scene.add(particles);function animate(){requestAnimationFrame(animate);material.uniforms.uTime.value+=0.01;renderer.render(scene,camera)}animate();const modal=document.getElementById("loginModal");const exploreBtn=document.querySelector(".btn");exploreBtn.onclick=()=>{document.querySelectorAll(".glass-card input").forEach(input=>{input.value=""});const error=document.getElementById("loginError");error.innerHTML="";error.classList.remove("show");modal.classList.add("show");document.querySelector(".glass-card input").focus()};document.getElementById("closeBtn").onclick=()=>{modal.classList.remove("show")}modal.onclick=(e)=>{if(e.target===modal){modal.classList.remove("show")}}const loginBtn=document.getElementById("loginBtn");loginBtn.onclick=()=>{const inputs=document.querySelectorAll(".glass-card input");const username=inputs[0].value.trim();const password=inputs[1].value.trim();const error=document.getElementById("loginError");if(username===""||password===""){error.innerHTML="🔐 请输入用户名和密码"}else{error.innerHTML="⚠️ 用户名不存在或密码错误"}error.classList.add("show");document.querySelector(".glass-card").classList.add("shake");setTimeout(()=>{document.querySelector(".glass-card").classList.remove("shake")},500)};document.querySelectorAll(".glass-card input").forEach(input=>{input.addEventListener("input",()=>{document.getElementById("loginError").classList.remove("show")})});window.addEventListener("resize",()=>{renderer.setSize(window.innerWidth,window.innerHeight);camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix()});</script></body></html>
